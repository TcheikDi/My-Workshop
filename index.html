<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta-Labor: Pro Forschungszentrum & Science Park</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .panel { background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #ccc; pointer-events: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2); margin-bottom: 10px; max-width: 320px; color: #333; }
        h1 { margin: 0 0 8px 0; font-size: 1.1rem; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        p { font-size: 0.8rem; line-height: 1.4; color: #444; }
        .kit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { background: #3498db; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s; font-size: 0.7rem; }
        button:hover { background: #2980b9; }
        #status-msg { position: absolute; bottom: 80px; width: 100%; text-align: center; pointer-events: none; font-size: 1rem; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000; padding: 8px; }
        #ai-panel { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); width: 320px; display: none; }
        .ai-sparkle { color: #8e44ad; font-weight: bold; }
        .loading-spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(142, 68, 173, 0.3); border-radius: 50%; border-top-color: #8e44ad; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="panel">
        <h1>VR Workshop & Science Playground</h1>
        <p>Wähle im <b>Showroom</b> ein Paket, bringe es zu einem Tisch und baue es dort Schritt für Schritt. Draußen wartet der <b>Science Playground</b>.</p>
        <div class="kit-grid">
            <button onclick="orderKit('windmill')">Windmühle</button>
            <button onclick="orderKit('car')">Solar-Auto</button>
            <button onclick="orderKit('chemistry')">Chemie-Set</button>
            <button onclick="orderKit('fuelcell')">Brennstoffzelle</button>
        </div>
    </div>
    
    <div id="assembly-panel" class="panel" style="display:none;">
        <h1 id="kit-title">Montage-Status</h1>
        <div id="progress-bar" style="width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden;">
            <div id="progress-fill" style="width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s;"></div>
        </div>
    </div>

    <div id="ai-panel" class="panel">
        <h1><span class="ai-sparkle">📱</span> Gemini KI-Laborant</h1>
        <div id="ai-content" style="max-height: 250px; overflow-y: auto; font-size: 0.85rem; margin-bottom: 10px; line-height: 1.4;">
            Wähle ein Objekt aus.
        </div>
        <div id="ai-status" style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">Bereit...</div>
        <button id="ai-ask-btn" onclick="getKitInstructions()" style="width:100%; background:#8e44ad; display:none;">✨ Anleitung generieren ✨</button>
    </div>
</div>

<div id="status-msg">Workshop bereit: Paket auswählen und losbauen. ✨</div>

<script type="module">
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

    // --- Gemini API Setup ---
    const apiKey = ""; 
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
    const TTS_MODEL = "gemini-2.5-flash-preview-tts";

    async function generateAIText(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Du bist ein KI-Mentor in einem Forschungszentrum." }] } };
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const result = await res.json();
        return result.candidates?.[0]?.content?.parts?.[0]?.text || "Fehler.";
    }

    async function speakText(text) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: `Erkläre kurz: ${text}` }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } };
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const result = await res.json();
        const base64Audio = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
        if (base64Audio) playAudio(base64Audio);
    }

    function playAudio(base64) {
        const binaryString = atob(base64);
        const bytes = new Int16Array(binaryString.length / 2);
        for (let i = 0; i < binaryString.length; i += 2) bytes[i/2] = (binaryString.charCodeAt(i+1) << 8) | binaryString.charCodeAt(i);
        const ctx = new AudioContext();
        const buffer = ctx.createBuffer(1, bytes.length, 24000);
        buffer.getChannelData(0).set(Array.from(bytes).map(v => v / 32768));
        const src = ctx.createBufferSource(); src.buffer = buffer; src.connect(ctx.destination); src.start();
    }

    // --- Three.js Kern ---
    let scene, camera, renderer, raycaster, mouse, controls, xrGroup, controllerR, controllerL, teleportMarker;
    let tables = [], parts = [], floorMeshes = [], interactiveObjects = [];
    let isCarrying = false, currentTable = null, activeKitType = null, assemblyStep = 0, totalSteps = 0;
    const moveSpeed = 0.08;
    let canSnapTurn = true;

    const labGroup = new THREE.Group();
    const showroomGroup = new THREE.Group();
    const parkGroup = new THREE.Group();
    const kitBuildConfigs = {
        windmill: { title: 'Windmühle', colors: [0x8ecae6, 0x219ebc, 0x023047] },
        car: { title: 'Solar-Auto', colors: [0xfcbf49, 0xf77f00, 0xd62828] },
        chemistry: { title: 'Chemie-Set', colors: [0x80ed99, 0x57cc99, 0x22577a] },
        fuelcell: { title: 'Brennstoffzelle', colors: [0xffe66d, 0xff9f1c, 0x2ec4b6] }
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0xd4e4f5, 30, 400);
        xrGroup = new THREE.Group(); scene.add(xrGroup);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
        camera.position.set(0, 5, 25); xrGroup.add(camera);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true; renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0); controls.enableDamping = true;

        raycaster = new THREE.Raycaster(); mouse = new THREE.Vector2();
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0); sun.position.set(100, 200, 100); sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096); scene.add(sun);

        buildArchitecture();
        setupVR();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        renderer.setAnimationLoop(animate);
    }

    function buildArchitecture() {
                // Boden Außenbereich
        const meadow = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({ color: 0x4d7a3d, roughness: 1 }));
        meadow.rotation.x = -Math.PI/2; meadow.receiveShadow = true; scene.add(meadow); floorMeshes.push(meadow);

        const wallH = 6, labW = 40, labD = 35;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf5f6f7 });
        scene.add(labGroup);

        // Labor Boden
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(labW, labD), new THREE.MeshStandardMaterial({ color: 0x2c2f33 }));
        floor.rotation.x = -Math.PI/2; floor.position.y = 0.02; floor.receiveShadow = true; labGroup.add(floor); floorMeshes.push(floor);
        const ceil = new THREE.Mesh(new THREE.PlaneGeometry(labW, labD), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        ceil.rotation.x = Math.PI/2; ceil.position.y = wallH; labGroup.add(ceil);

        // Wände Labor
        const wallB = new THREE.Mesh(new THREE.BoxGeometry(labW, wallH, 0.5), wallMat); wallB.position.set(0, wallH/2, labD/2); labGroup.add(wallB);
        const wallR = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, labD), wallMat); wallR.position.set(labW/2, wallH/2, 0); labGroup.add(wallR);

        // Trennwand zum Showroom
        const wallL1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, 10), wallMat); wallL1.position.set(-labW/2, wallH/2, 12.5); labGroup.add(wallL1);
        const wallL2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, 10), wallMat); wallL2.position.set(-labW/2, wallH/2, -12.5); labGroup.add(wallL2);
        const wallLTop = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 15), wallMat); wallLTop.position.set(-labW/2, 5, 0); labGroup.add(wallLTop);

        // Showroom Anbau (Links)
        const shopSize = 15; const shopX = -labW/2 - shopSize/2;
        scene.add(showroomGroup);
        const sFloor = new THREE.Mesh(new THREE.PlaneGeometry(shopSize, shopSize), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        sFloor.rotation.x = -Math.PI/2; sFloor.position.set(shopX, 0.03, 0); showroomGroup.add(sFloor); floorMeshes.push(sFloor);
        const sWBack = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, shopSize), wallMat); sWBack.position.set(shopX - shopSize/2, wallH/2, 0); showroomGroup.add(sWBack);
        const sWNorth = new THREE.Mesh(new THREE.BoxGeometry(shopSize, wallH, 0.5), wallMat); sWNorth.position.set(shopX, wallH/2, shopSize/2); showroomGroup.add(sWNorth);
        const sWSouth = new THREE.Mesh(new THREE.BoxGeometry(shopSize, wallH, 0.5), wallMat); sWSouth.position.set(shopX, wallH/2, -shopSize/2); showroomGroup.add(sWSouth);
        const sCounter = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 8), new THREE.MeshStandardMaterial({ color: 0x111 }));
        sCounter.position.set(shopX + 2, 0.5, 0); showroomGroup.add(sCounter);

        const kits = [{id:'windmill',c:0x3498db,z:-3},{id:'car',c:0xe74c3c,z:-1},{id:'chemistry',c:0x2ecc71,z:1},{id:'fuelcell',c:0xf1c40f,z:3}];
        kits.forEach(p => {
            const btn = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.5), new THREE.MeshStandardMaterial({color: p.c, emissive: p.c, emissiveIntensity: 0.5}));
            btn.position.set(shopX + 2, 1.1, p.z); btn.userData = { type: 'vr_order_btn', kit: p.id };
            showroomGroup.add(btn); interactiveObjects.push(btn);
        });

        // --- GLASFRONT & TÜR (Z- Achse) ---
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x222, metalness: 0.8 });
        const glassMat = new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        
        // Segmente
        const segW = labW / 3;
        for(let i=0; i<3; i++) {
            const xPos = -labW/2 + segW/2 + i*segW;
            if(i === 2) { // TÜRBÖREICH (Rechts vom Eingang aus gesehen)
                const pL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 0.6), frameMat); pL.position.set(xPos - 2, 1.75, -labD/2); labGroup.add(pL);
                const pR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 0.6), frameMat); pR.position.set(xPos + 2, 1.75, -labD/2); labGroup.add(pR);
                const pT = new THREE.Mesh(new THREE.BoxGeometry(4, 0.3, 0.6), frameMat); pT.position.set(xPos, 3.5, -labD/2); labGroup.add(pT);
                const gAbove = new THREE.Mesh(new THREE.PlaneGeometry(4, 2.5), glassMat); gAbove.position.set(xPos, 4.75, -labD/2 + 0.01); labGroup.add(gAbove);
                continue;
            }
            const gSeg = new THREE.Mesh(new THREE.PlaneGeometry(segW, wallH), glassMat);
            gSeg.position.set(xPos, wallH/2, -labD/2 + 0.01); labGroup.add(gSeg);
            const vF = new THREE.Mesh(new THREE.BoxGeometry(0.3, wallH, 0.6), frameMat); vF.position.set(xPos + segW/2, wallH/2, -labD/2); labGroup.add(vF);
        }

        // Tische
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 5; j++) {
                createTable(labGroup, (i*8)-12, (j*6)-12);
            }
        }

        buildSciencePark();
        buildVegetation();
    }

    function createTable(parent, x, z) {
        const g = new THREE.Group();
        const plate = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 2.0), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        plate.position.y = 0.75; plate.userData = { type: 'table_top', pos: new THREE.Vector3(x, 0.8, z) };
        g.add(plate); tables.push(plate); interactiveObjects.push(plate);

        // 2 Stühle pro Tisch
        for(let s=0; s<2; s++) {
            const chair = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0x222});
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.7), mat); seat.position.y = 0.45; chair.add(seat);
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 0.08), mat); back.position.set(0, 0.8, 0.35); chair.add(back);
            [[0.25, 0.22, 0.25], [-0.25, 0.22, 0.25], [0.25, 0.22, -0.25], [-0.25, 0.22, -0.25]].forEach(p => {
                const l = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.45), mat); l.position.set(p[0], p[1], p[2]); chair.add(l);
            });
            chair.position.z = (s === 0 ? 1.4 : -1.4); chair.rotation.y = (s === 0 ? 0 : Math.PI);
            g.add(chair);
        }

        const tablet = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.02, 0.2), new THREE.MeshStandardMaterial({ color: 0x111 }));
        tablet.position.set(1.2, 0.82, 0.6); tablet.userData = { type: 'table_tablet' }; g.add(tablet); interactiveObjects.push(tablet);
        g.position.set(x, 0, z); parent.add(g);
    }

    function buildSciencePark() {
        const area = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshStandardMaterial({ color: 0xc2b280 }));
        area.rotation.x = -Math.PI/2; area.position.set(0, 0.01, -110); scene.add(area); floorMeshes.push(area);
        scene.add(parkGroup);

        // --- RUTSCHE ---
        const slide = new THREE.Group();
        const ladderL = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 5), new THREE.MeshStandardMaterial({color:0x555}));
        ladderL.position.set(-0.6, 2.5, 0); slide.add(ladderL);
        const ladderR = ladderL.clone(); ladderR.position.set(0.6, 2.5, 0); slide.add(ladderR);
        const sPlank = new THREE.Mesh(new THREE.BoxGeometry(1.5, 10, 0.2), new THREE.MeshStandardMaterial({color: 0xcc0000, metalness: 0.6, roughness: 0.1}));
        sPlank.position.set(0, 2.2, -4.5); sPlank.rotation.x = -0.45; slide.add(sPlank);
        slide.position.set(15, 0, -70); slide.userData = { type: 'science_object', name: 'Rutsche' };
        parkGroup.add(slide); interactiveObjects.push(sPlank);

        // --- SCHAUKEL ---
        const swing = new THREE.Group();
        const beam = new THREE.Mesh(new THREE.BoxGeometry(6, 0.3, 0.3), new THREE.MeshStandardMaterial({color:0x3b2416}));
        beam.position.y = 5; swing.add(beam);
        [[3,2.5,1.5],[3,2.5,-1.5],[-3,2.5,1.5],[-3,2.5,-1.5]].forEach(p => {
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 6, 0.2), new THREE.MeshStandardMaterial({color: 0x3b2416}));
            leg.position.set(p[0], p[1], p[2]); leg.rotation.z = (p[0]>0 ? 0.2 : -0.2); swing.add(leg);
        });
        const seat = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x222}));
        seat.position.set(0, 0.8, 0); swing.add(seat);
        swing.position.set(-15, 0, -70); swing.userData = { type: 'science_object', name: 'Schaukel' };
        parkGroup.add(swing); interactiveObjects.push(seat);

        // --- NEWTON PENDEL ---
        const newton = new THREE.Group();
        const nf = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 0.2), new THREE.MeshStandardMaterial({color:0x777})); nf.position.y = 3; newton.add(nf);
        for(let i=0; i<5; i++) {
            const ball = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 1, roughness: 0}));
            ball.position.set(-2 + i*1.01, 1, 0); ball.userData = { type: 'science_object', name: 'Newton Pendel' };
            newton.add(ball); interactiveObjects.push(ball);
        }
        newton.position.set(30, 0, -100); parkGroup.add(newton);

        // --- KARUSSELL ---
        const carousel = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 0.3, 32), new THREE.MeshStandardMaterial({color: 0xe74c3c}));
        carousel.position.set(-30, 0.15, -100); carousel.userData = { type: 'science_object', name: 'Karussell' };
        parkGroup.add(carousel); interactiveObjects.push(carousel);
    }

    function buildVegetation() {
        const vegetationGroup = new THREE.Group(); scene.add(vegetationGroup);
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
        for(let i=0; i<80; i++) {
            const rx = (Math.random()-0.5)*400; const rz = (Math.random()-0.5)*400;
            if(Math.abs(rx) < 60 && rz > -50 && rz < 40) continue;
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3), new THREE.MeshStandardMaterial({ color: 0x4b3621 }));
            trunk.position.y = 1.5; tree.add(trunk);
            for(let j=0; j<4; j++) {
                const l = new THREE.Mesh(new THREE.SphereGeometry(1.2 + Math.random()*0.5, 8, 8), leafMat);
                l.position.set((Math.random()-0.5)*2.5, 3 + j*0.6, (Math.random()-0.5)*2.5); tree.add(l);
            }
            tree.position.set(rx, 0, rz); vegetationGroup.add(tree);
        }
    }

    // --- INTERACTION ---
        window.orderKit = (type) => {
        if (kitBox) scene.remove(kitBox);
        activeKitType = type;
        assemblyStep = 0;
        currentTable = null;
        isCarrying = false;
        parts.forEach(p => scene.remove(p));
        parts = [];
        kitBox = new THREE.Mesh(new THREE.BoxGeometry(1, 0.6, 1), new THREE.MeshStandardMaterial({ color: 0xd2b48c }));
        kitBox.position.set(-28.5, 1.4, 0); kitBox.userData = { type: 'kit_box' };
        scene.add(kitBox); interactiveObjects.push(kitBox);
        document.getElementById('ai-panel').style.display = 'block';
        document.getElementById('ai-content').innerText = "Paket geliefert. Bring es zum Tisch!";
        document.getElementById('ai-ask-btn').style.display = 'block';
        document.getElementById('assembly-panel').style.display = 'none';
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('status-msg').innerText = 'Paket aufgenommen. Lege es auf einen freien Tisch.';
    };

    function spawnBuildStep() {
        if (!currentTable || !activeKitType) return;
        const config = kitBuildConfigs[activeKitType] || kitBuildConfigs.windmill;
        if (assemblyStep >= totalSteps) return;
        const tx = currentTable.pos.x, tz = currentTable.pos.z, th = currentTable.pos.y;
        const stepIndex = assemblyStep;
        const color = config.colors[stepIndex];
        const part = new THREE.Mesh(
            new THREE.BoxGeometry(0.45 + stepIndex * 0.18, 0.2, 0.45 + stepIndex * 0.18),
            new THREE.MeshStandardMaterial({ color })
        );
        part.position.set(tx, th + 0.12 + stepIndex * 0.18, tz);
        part.userData = { step: stepIndex + 1 };
        scene.add(part);
        parts.push(part);
        interactiveObjects.push(part);
    }

    function unpackKit() {
        if (!currentTable) return;
        scene.remove(kitBox); kitBox = null; assemblyStep = 0; parts.forEach(p => scene.remove(p)); parts = [];
        const config = kitBuildConfigs[activeKitType] || kitBuildConfigs.windmill;
        document.getElementById('assembly-panel').style.display = 'block';
        document.getElementById('kit-title').innerText = `${config.title} – Montage-Status`;
        document.getElementById('progress-fill').style.width = '0%';
        totalSteps = config.colors.length;
        spawnBuildStep();
        document.getElementById('status-msg').innerText = 'Bauteile bereit. Klicke die Teile, um den Aufbau abzuschließen.';
    }

    async function explainObject(name) {
        const contentDiv = document.getElementById('ai-content');
        const statusDiv = document.getElementById('ai-status');
        document.getElementById('ai-panel').style.display = 'block';
        statusDiv.innerHTML = '<div class="loading-spinner"></div> Analysiere ' + name + '...';
        const text = await generateAIText(`Erkläre kurz das physikalische Prinzip von ${name} auf einem Spielplatz.`);
        contentDiv.innerHTML = `<strong>Wissenschaft: ${name}</strong><br>${text}`;
        await speakText(text);
        statusDiv.innerText = "Bereit.";
    }

    window.getKitInstructions = async () => {
        const text = await generateAIText(`Kurze Bauanleitung für ${activeKitType}. Max 3 Schritte.`);
        document.getElementById('ai-content').innerHTML = `<strong>Anleitung:</strong><br>${text}`;
        await speakText(text);
    };

    function setupVR() {
        controllerR = renderer.xr.getController(0);
        controllerR.addEventListener('selectstart', () => { raycaster.ray.origin.setFromMatrixPosition(controllerR.matrixWorld); const tM = new THREE.Matrix4(); tM.identity().extractRotation(controllerR.matrixWorld); raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tM); handleInteraction(); });
        xrGroup.add(controllerR); controllerL = renderer.xr.getController(1); xrGroup.add(controllerL);
        teleportMarker = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.04, 12, 32), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 }));
        teleportMarker.rotation.x = -Math.PI/2; teleportMarker.visible = false; scene.add(teleportMarker);
    }

    function handleVRMovement() {
        const session = renderer.xr.getSession(); if (!session) return;
        for (const source of session.inputSources) {
            if (!source.gamepad) continue;
            const axes = source.gamepad.axes;
            if (source.handedness === 'left' && (Math.abs(axes[3]) > 0.1 || Math.abs(axes[2]) > 0.1)) {
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();
                xrGroup.position.addScaledVector(dir, -axes[3] * moveSpeed); xrGroup.position.addScaledVector(side, -axes[2] * moveSpeed);
            }
            if (source.handedness === 'right') {
                if (canSnapTurn && Math.abs(axes[2]) > 0.8) { xrGroup.rotation.y += (axes[2] > 0 ? -Math.PI/4 : Math.PI/4); canSnapTurn = false; setTimeout(() => canSnapTurn = true, 300); }
                if (axes[3] < -0.6) {
                    const tM = new THREE.Matrix4(); tM.identity().extractRotation(controllerL.matrixWorld); raycaster.ray.origin.setFromMatrixPosition(controllerL.matrixWorld); raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tM);
                    const hits = raycaster.intersectObjects(floorMeshes);
                    if (hits.length > 0) { teleportMarker.position.copy(hits[0].point); teleportMarker.visible = true; }
                } else if (teleportMarker.visible) {
                    const camPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
                    xrGroup.position.add(new THREE.Vector3().copy(teleportMarker.position).sub(camPos.setY(0))); teleportMarker.visible = false;
                }
            }
        }
    }

    function handleInteraction() {
        const hits = raycaster.intersectObjects(scene.children, true);
        if (hits.length === 0) return;
        const target = hits[0].object;
        if (target.userData.type === 'science_object') { explainObject(target.userData.name); return; }
        if (target.userData.type === 'table_tablet') { window.getKitInstructions(); return; }
        if (target.userData.type === 'vr_order_btn') { orderKit(target.userData.kit); return; }
        if (target.userData.type === 'kit_box') {
            if (!isCarrying && !currentTable) {
                isCarrying = true;
                document.getElementById('status-msg').innerText = 'Paket wird getragen. Wähle einen Tisch.';
            } else if (!isCarrying && currentTable) {
                unpackKit();
            }
            return;
        }
        if (isCarrying && target.userData.type === 'table_top') {
            currentTable = target.userData;
            kitBox.position.copy(currentTable.pos).setY(currentTable.pos.y + 0.3);
            isCarrying = false;
            document.getElementById('status-msg').innerText = 'Paket abgelegt. Klicke das Paket zum Auspacken.';
            return;
        }
        let p = target; while(p.parent && !p.userData.step) p = p.parent;
        if(p && p.userData.step) {
             if (p.userData.step !== assemblyStep + 1) return;
             assemblyStep++;
             const progress = Math.round((assemblyStep / totalSteps) * 100);
             document.getElementById('progress-fill').style.width = `${progress}%`;
             p.material.emissive = new THREE.Color(0x2ecc71);
             p.material.emissiveIntensity = 0.5;
             if (assemblyStep >= totalSteps) {
                document.getElementById('status-msg').innerText = 'Projekt abgeschlossen! Wähle gern ein neues Paket.';
             } else {
                spawnBuildStep();
             }
        }
    }

    function onMouseDown() { if (!renderer.xr.isPresenting) { raycaster.setFromCamera(mouse, camera); handleInteraction(); }}
    function onMouseMove(event) {
        mouse.x = (event.clientX/window.innerWidth)*2-1; mouse.y = -(event.clientY/window.innerHeight)*2+1;
        if (isCarrying && kitBox && !renderer.xr.isPresenting) {
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -1.1);
            const intersectPoint = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, intersectPoint);
            kitBox.position.copy(intersectPoint);
        }
    }

    function animate() { if (!renderer.xr.isPresenting) controls.update(); handleVRMovement(); renderer.render(scene, camera); }
    function onWindowResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    init();
</script>

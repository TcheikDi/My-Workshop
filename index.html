<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta-Labor: Forschungszentrum & Science Park Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #a4c5e8; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .panel { background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #ccc; pointer-events: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 10px; max-width: 320px; color: #333; }
        h1 { margin: 0 0 8px 0; font-size: 1.1rem; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        p { font-size: 0.8rem; line-height: 1.4; color: #444; }
        .kit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { background: #3498db; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s; font-size: 0.7rem; }
        button:hover { background: #2980b9; }
        #status-msg { position: absolute; bottom: 80px; width: 100%; text-align: center; pointer-events: none; font-size: 1rem; color: #2c3e50; font-weight: bold; background: rgba(255,255,255,0.4); padding: 8px; }
        #ai-panel { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); width: 320px; display: none; }
        .ai-sparkle { color: #8e44ad; font-weight: bold; }
        .loading-spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(142, 68, 173, 0.3); border-radius: 50%; border-top-color: #8e44ad; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="panel">
        <h1>Labor Forschungs-Zentrum</h1>
        <p>Nutze die <b>Türöffnung</b> in der Glasfront zum Park.</p>
        <div class="kit-grid">
            <button onclick="orderKit('windmill')">Windmühle</button>
            <button onclick="orderKit('car')">Solar-Auto</button>
            <button onclick="orderKit('chemistry')">Chemie-Set</button>
            <button onclick="orderKit('fuelcell')">Brennstoffzelle</button>
        </div>
    </div>
    
    <div id="assembly-panel" class="panel" style="display:none;">
        <h1 id="kit-title">Projekt-Status</h1>
        <div id="progress-bar" style="width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden;">
            <div id="progress-fill" style="width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s;"></div>
        </div>
    </div>

    <div id="ai-panel" class="panel">
        <h1><span class="ai-sparkle">📱</span> Gemini KI-Assistent</h1>
        <div id="ai-content" style="max-height: 250px; overflow-y: auto; font-size: 0.85rem; margin-bottom: 10px; line-height: 1.4;">
            Klicke auf ein Gerät im Park für eine Erklärung.
        </div>
        <div id="ai-status" style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">Bereit...</div>
    </div>
</div>

<div id="status-msg">Labor-Architektur und Science Park wurden fixiert. ✨</div>

<script type="module">
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

    // --- Gemini API Setup ---
    const apiKey = ""; 
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
    const TTS_MODEL = "gemini-2.5-flash-preview-tts";

    async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
        try {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        } catch (error) {
            if (retries > 0) {
                await new Promise(resolve => setTimeout(resolve, backoff));
                return fetchWithRetry(url, options, retries - 1, backoff * 2);
            }
            throw error;
        }
    }

    async function generateAIText(prompt, systemInstruction = "Du bist ein Mentor in einem Forschungszentrum.") {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemInstruction }] } };
        const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        return result.candidates?.[0]?.content?.parts?.[0]?.text || "Fehler.";
    }

    async function speakText(text) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: `Erkläre kurz: ${text}` }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } };
        const result = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const base64Audio = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
        if (base64Audio) playPCMAudio(base64Audio);
    }

    function playPCMAudio(base64Data) {
        const binaryString = atob(base64Data);
        const len = binaryString.length;
        const bytes = new Int16Array(len / 2);
        for (let i = 0; i < len; i += 2) bytes[i / 2] = (binaryString.charCodeAt(i+1) << 8) | binaryString.charCodeAt(i);
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = audioCtx.createBuffer(1, bytes.length, 24000);
        const channelData = buffer.getChannelData(0);
        for (let i = 0; i < bytes.length; i++) channelData[i] = bytes[i] / 32768;
        const source = audioCtx.createBufferSource();
        source.buffer = buffer; source.connect(audioCtx.destination); source.start();
    }

    async function explainObject(objectName) {
        const contentDiv = document.getElementById('ai-content');
        const statusDiv = document.getElementById('ai-status');
        document.getElementById('ai-panel').style.display = 'block';
        statusDiv.innerHTML = '<div class="loading-spinner"></div> Analysiere ' + objectName + '...';
        try {
            const prompt = `Erkläre kurz (max 2 Sätze) die Physik hinter einer ${objectName} auf einem Spielplatz.`;
            const response = await generateAIText(prompt);
            contentDiv.innerHTML = `<strong>Wissenschaft: ${objectName}</strong><br>` + response;
            statusDiv.innerText = "Spreche...";
            await speakText(response);
            statusDiv.innerText = "Bereit.";
        } catch (e) { statusDiv.innerText = "Fehler."; }
    }

    // --- Three.js Logic ---
    let scene, camera, renderer, raycaster, mouse, controls;
    let kitBox, activeModel, teleportMarker;
    let tables = [], parts = [], floorMeshes = [], interactiveObjects = [];
    let isCarrying = false, currentTable = null, activeKitType = null;
    let assemblyStep = 0, totalSteps = 0;
    let playgroundObjects = { carousel: null, newtonBalls: [] };
    let controllerR, controllerL, xrGroup;
    let canSnapTurn = true;
    const moveSpeed = 0.08;

    function createPosterTexture(type) {
        const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 724;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,512,724);
        ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 10; ctx.strokeRect(20,20,472,684);
        ctx.fillStyle = '#3498db'; ctx.font = 'bold 40px Segoe UI'; ctx.textAlign = 'center';
        if(type === 'car') { ctx.fillText('SOLAR CAR PROTOTYPE', 256, 100); ctx.fillStyle = '#555'; ctx.fillRect(100, 300, 312, 100); ctx.beginPath(); ctx.arc(150, 420, 40, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(362, 420, 40, 0, Math.PI*2); ctx.fill(); }
        else if(type === 'atom') { ctx.fillText('MOLECULAR ANALYSIS', 256, 100); ctx.strokeStyle = '#e67e22'; ctx.beginPath(); ctx.arc(256, 350, 100, 0, Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.ellipse(256, 350, 150, 50, 45, 0, Math.PI*2); ctx.stroke(); }
        else { ctx.fillText('GREEN ENERGY', 256, 100); ctx.fillStyle = '#27ae60'; ctx.beginPath(); ctx.moveTo(256, 200); ctx.lineTo(320, 400); ctx.lineTo(192, 400); ctx.fill(); }
        return new THREE.CanvasTexture(canvas);
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0xd4e4f5, 40, 250);
        
        xrGroup = new THREE.Group(); scene.add(xrGroup);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
        camera.position.set(0, 1.6, 25); xrGroup.add(camera);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0); controls.enableDamping = true;

        raycaster = new THREE.Raycaster(); mouse = new THREE.Vector2();

        setupLighting(); createEnvironment(); createArchitecture(); createSciencePark(); setupVR();

        window.addEventListener('resize', onWindowResize); window.addEventListener('mousedown', onMouseDown); window.addEventListener('mousemove', onMouseMove);
        renderer.setAnimationLoop(animate);
    }

    function setupLighting() {
        scene.add(new THREE.HemisphereLight(0xd4e4f5, 0x444444, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096); scene.add(sun);
    }

    function createEnvironment() {
        const meadow = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({ color: 0x4d7a3d, roughness: 1 }));
        meadow.rotation.x = -Math.PI / 2; meadow.receiveShadow = true; scene.add(meadow); floorMeshes.push(meadow);
        teleportMarker = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.04, 12, 32), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 }));
        teleportMarker.rotation.x = -Math.PI / 2; teleportMarker.visible = false; scene.add(teleportMarker);
    }

    function createArchitecture() {
        const wallH = 6; const labW = 40; const labD = 35;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf5f6f7 });
        
        // Floor & Ceiling
        const labFloor = new THREE.Mesh(new THREE.PlaneGeometry(labW, labD), new THREE.MeshStandardMaterial({ color: 0x2c2f33, roughness: 0.9 }));
        labFloor.rotation.x = -Math.PI/2; labFloor.position.set(0, 0.01, 0); labFloor.receiveShadow = true; scene.add(labFloor); floorMeshes.push(labFloor);
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(labW, labD), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        ceiling.rotation.x = Math.PI/2; ceiling.position.set(0, wallH, 0); scene.add(ceiling);

        // Solid Walls
        const wallBack = new THREE.Mesh(new THREE.BoxGeometry(labW, wallH, 0.5), wallMat); wallBack.position.set(0, wallH/2, labD/2); scene.add(wallBack);
        const wallRight = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, labD), wallMat); wallRight.position.set(labW/2, wallH/2, 0); scene.add(wallRight);

        // Shop Connection Walls
        const wallL1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, 10), wallMat); wallL1.position.set(-labW/2, wallH/2, 12.5); scene.add(wallL1);
        const wallL2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, 10), wallMat); wallL2.position.set(-labW/2, wallH/2, -12.5); scene.add(wallL2);
        const wallL3 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.5, 15), wallMat); wallL3.position.set(-labW/2, 4.75, 0); scene.add(wallL3);

        // --- GLASFRONT MIT TÜR ---
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 });
        const glassMat = new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent: true, opacity: 0.15 });

        // Boden- und Deckenrahmen
        const bF = new THREE.Mesh(new THREE.BoxGeometry(labW, 0.4, 0.6), frameMat); bF.position.set(0, 0.2, -labD/2); scene.add(bF);
        const tF = new THREE.Mesh(new THREE.BoxGeometry(labW, 0.4, 0.6), frameMat); tF.position.set(0, wallH - 0.2, -labD/2); scene.add(tF);

        // Glas-Segmente (stabil positioniert)
        const segW = labW / 4;
        for(let i=0; i<4; i++) {
            const xPos = -labW/2 + segW/2 + i*segW;
            if(i === 0) { // TÜRBÖREICH
                const pL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 0.6), frameMat); pL.position.set(xPos - 2, 1.75, -labD/2); scene.add(pL);
                const pR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 0.6), frameMat); pR.position.set(xPos + 2, 1.75, -labD/2); scene.add(pR);
                const pT = new THREE.Mesh(new THREE.BoxGeometry(4, 0.3, 0.6), frameMat); pT.position.set(xPos, 3.5, -labD/2); scene.add(pT);
                // Glas über der Tür
                const gT = new THREE.Mesh(new THREE.PlaneGeometry(4, 2.5), glassMat); gT.position.set(xPos, 4.75, -labD/2 + 0.05); scene.add(gT);
                continue;
            }
            const glass = new THREE.Mesh(new THREE.PlaneGeometry(segW, wallH - 0.8), glassMat);
            glass.position.set(xPos, wallH/2, -labD/2 + 0.05);
            scene.add(glass);
            const vF = new THREE.Mesh(new THREE.BoxGeometry(0.3, wallH, 0.6), frameMat);
            vF.position.set(xPos + segW/2, wallH/2, -labD/2);
            scene.add(vF);
        }

        // Showroom
        const shopSize = 15; const shopX = -labW/2 - shopSize/2;
        const shopFloor = new THREE.Mesh(new THREE.PlaneGeometry(shopSize, shopSize), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        shopFloor.rotation.x = -Math.PI/2; shopFloor.position.set(shopX, 0.02, 0); floorMeshes.push(shopFloor); scene.add(shopFloor);
        const shopCeil = new THREE.Mesh(new THREE.PlaneGeometry(shopSize, shopSize), wallMat);
        shopCeil.rotation.x = Math.PI/2; shopCeil.position.set(shopX, wallH, 0); scene.add(shopCeil);
        const sW1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, shopSize), wallMat); sW1.position.set(shopX-shopSize/2, wallH/2, 0); scene.add(sW1);
        const sW2 = new THREE.Mesh(new THREE.BoxGeometry(shopSize, wallH, 0.5), wallMat); sW2.position.set(shopX, wallH/2, shopSize/2); scene.add(sW2);
        const sW3 = new THREE.Mesh(new THREE.BoxGeometry(shopSize, wallH, 0.5), wallMat); sW3.position.set(shopX, wallH/2, -shopSize/2); scene.add(sW3);

        const counter = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 8), new THREE.MeshStandardMaterial({ color: 0x111 }));
        counter.position.set(shopX + 2, 0.5, 0); scene.add(counter);

        const kits = [{id:'windmill',c:0x3498db,z:-3},{id:'car',c:0xe74c3c,z:-1},{id:'chemistry',c:0x2ecc71,z:1},{id:'fuelcell',c:0xf1c40f,z:3}];
        kits.forEach(p => {
            const btn = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.5), new THREE.MeshStandardMaterial({color: p.c, emissive: p.c, emissiveIntensity: 0.5}));
            btn.position.set(shopX + 2, 1.1, p.z); btn.userData = { type: 'vr_order_btn', kit: p.id };
            scene.add(btn); interactiveObjects.push(btn);
        });

        // Tische & Stühle (Innerhalb Lab)
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 5; j++) {
                createTable((i * 8) - 12, (j * 6) - 12);
            }
        }
    }

    function createTable(tx, tz) {
        const group = new THREE.Group();
        const plate = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 2.2), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        plate.position.y = 0.75; plate.userData = { type: 'table_top', pos: new THREE.Vector3(tx, 0.8, tz) };
        group.add(plate); tables.push(plate); interactiveObjects.push(plate);
        const tablet = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.02, 0.2), new THREE.MeshStandardMaterial({ color: 0x111 }));
        tablet.position.set(1.2, 0.82, 0.6); tablet.userData = { type: 'table_tablet' };
        group.add(tablet); interactiveObjects.push(tablet);
        [[1.6, 0.37, 1], [-1.6, 0.37, 1], [1.6, 0.37, -1], [-1.6, 0.37, -1]].forEach(p => {
            const l = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.75, 0.1), new THREE.MeshStandardMaterial({color:0x444}));
            l.position.set(p[0], p[1], p[2]); group.add(l);
        });
        // Stühle
        for(let s=0; s<2; s++) {
            const chair = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0x222222});
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.7), mat); seat.position.y = 0.45; chair.add(seat);
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 0.08), mat); back.position.set(0, 0.75, 0.35); chair.add(back);
            [[0.25, 0.22, 0.25], [-0.25, 0.22, 0.25], [0.25, 0.22, -0.25], [-0.25, 0.22, -0.25]].forEach(p => {
                const l = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.45), mat); l.position.set(p[0], p[1], p[2]); chair.add(l);
            });
            chair.position.set(0, 0, (s === 0 ? 1.5 : -1.5)); chair.rotation.y = (s === 0 ? 0 : Math.PI);
            group.add(chair);
        }
        group.position.set(tx, 0, tz); scene.add(group);
    }

    function createSciencePark() {
        const area = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0xc2b280, roughness: 1 }));
        area.rotation.x = -Math.PI/2; area.position.set(0, 0.01, -120); scene.add(area); floorMeshes.push(area);

        const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 });

        // --- RUTSCHE ---
        const slide = new THREE.Group();
        const sFrame = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5, 0.2), new THREE.MeshStandardMaterial({color: 0x555555}));
        const sL = sFrame.clone(); sL.position.set(-0.6, 2.5, 0); slide.add(sL);
        const sR = sFrame.clone(); sR.position.set(0.6, 2.5, 0); slide.add(sR);
        const sPlank = new THREE.Mesh(new THREE.BoxGeometry(1.4, 10, 0.2), new THREE.MeshStandardMaterial({color: 0xcc0000, metalness: 0.6, roughness: 0.1}));
        sPlank.position.set(0, 2, -4); sPlank.rotation.x = -0.5; slide.add(sPlank);
        slide.position.set(20, 0, -80); slide.userData = { type: 'science_object', name: 'Rutsche' };
        scene.add(slide); interactiveObjects.push(sPlank);

        // --- SCHAUKEL ---
        const swing = new THREE.Group();
        const beam = new THREE.Mesh(new THREE.BoxGeometry(6, 0.3, 0.3), frameMat); beam.position.y = 5; swing.add(beam);
        [[3,2.5,1], [3,2.5,-1], [-3,2.5,1], [-3,2.5,-1]].forEach(p => {
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5.5, 0.2), frameMat);
            leg.position.set(p[0], p[1], p[2]); leg.rotation.z = (p[0]>0 ? 0.2 : -0.2); leg.rotation.x = (p[2]>0 ? 0.2 : -0.2);
            swing.add(leg);
        });
        const sSeat = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.6), new THREE.MeshStandardMaterial({color: 0x222}));
        sSeat.position.y = 1; swing.add(sSeat);
        swing.position.set(-20, 0, -80); swing.userData = { type: 'science_object', name: 'Schaukel' };
        scene.add(swing); interactiveObjects.push(sSeat);

        // --- NEWTON PENDEL ---
        const newton = new THREE.Group();
        const nFrame = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 0.3), new THREE.MeshStandardMaterial({color: 0x777777}));
        nFrame.position.y = 3; newton.add(nFrame);
        for(let i=0; i<5; i++) {
            const ball = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshStandardMaterial({color: 0xeeeeee, metalness: 1, roughness: 0}));
            ball.position.set(-2 + i*1.01, 1, 0); ball.userData = { type: 'science_object', name: 'Newton Pendel' };
            newton.add(ball); interactiveObjects.push(ball);
        }
        newton.position.set(25, 0, -110); scene.add(newton);

        // --- KARUSSELL ---
        const carousel = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 0.3, 32), new THREE.MeshStandardMaterial({color: 0xe74c3c}));
        carousel.position.set(-25, 0.15, -110); carousel.userData = { type: 'science_object', name: 'Karussell' };
        scene.add(carousel); playgroundObjects.carousel = carousel; interactiveObjects.push(carousel);
    }

    // --- INTERACTION ---
    window.orderKit = (type) => {
        if (kitBox) scene.remove(kitBox); activeKitType = type; assemblyStep = 1;
        kitBox = new THREE.Mesh(new THREE.BoxGeometry(1, 0.6, 1), new THREE.MeshStandardMaterial({ color: 0xd2b48c }));
        kitBox.position.set(-28, 1.4, 0); kitBox.userData = { type: 'kit_box' };
        scene.add(kitBox); interactiveObjects.push(kitBox);
        document.getElementById('ai-panel').style.display = 'block';
    };

    function unpackKit() {
        if (!currentTable) return;
        scene.remove(kitBox); kitBox = null; assemblyStep = 1; parts.forEach(p => scene.remove(p)); parts = [];
        const tx = currentTable.pos.x, tz = currentTable.pos.z, th = currentTable.pos.y;
        document.getElementById('assembly-panel').style.display = 'block';
        if (activeKitType === 'windmill') {
            totalSteps = 3;
            const b = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,0.1), new THREE.MeshStandardMaterial({color:0x333})); b.position.set(tx-1, th+0.05, tz); b.userData = { step: 1 }; scene.add(b); parts.push(b); interactiveObjects.push(b);
            const m = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.2), new THREE.MeshStandardMaterial({color:0xccc})); m.position.set(tx+1, th+0.05, tz); m.userData = { step: 2 }; scene.add(m); parts.push(m); interactiveObjects.push(m);
            const r = new THREE.Group(); r.add(new THREE.Mesh(new THREE.SphereGeometry(0.1)));
            for(let i=0; i<3; i++){ const p = new THREE.Object3D(); p.rotation.z = (i*Math.PI*2)/3; const bl = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.02), new THREE.MeshStandardMaterial({color:0x3498db})); bl.position.y = 0.4; p.add(bl); r.add(p); }
            r.position.set(tx, th+0.05, tz+0.6); r.userData = { step: 3 }; scene.add(r); parts.push(r); interactiveObjects.push(r);
        } else { totalSteps = 1; const d = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), new THREE.MeshStandardMaterial({color:0x3498db})); d.position.set(tx, th+0.3, tz); d.userData = { step: 1 }; scene.add(d); parts.push(d); interactiveObjects.push(d); }
    }

    function tryAssemble(part) {
        const step = part.userData.step; if (step !== assemblyStep) return;
        const tx = currentTable.pos.x, tz = currentTable.pos.z, th = currentTable.pos.y;
        if (activeKitType === 'windmill') { if(step === 1) part.position.set(tx, th+0.05, tz); if(step === 2) { part.rotation.z = 0; part.position.set(tx, th+0.55, tz); } if(step === 3) { part.position.set(tx, th+1.25, tz+0.1); part.rotation.x = Math.PI/2; activeModel = part; isWindmillSpinning = true; } }
        else { part.position.set(tx, th+0.3, tz); }
        assemblyStep++; document.getElementById('progress-fill').style.width = (assemblyStep/totalSteps * 100) + "%";
    }

    function setupVR() {
        controllerR = renderer.xr.getController(0);
        controllerR.addEventListener('selectstart', () => {
            raycaster.ray.origin.setFromMatrixPosition(controllerR.matrixWorld);
            const tM = new THREE.Matrix4(); tM.identity().extractRotation(controllerR.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tM); handleInteraction();
        });
        xrGroup.add(controllerR); controllerL = renderer.xr.getController(1); xrGroup.add(controllerL);
    }

    function handleVRMovement() {
        const session = renderer.xr.getSession(); if (!session) return;
        for (const source of session.inputSources) {
            if (!source.gamepad) continue;
            const axes = source.gamepad.axes;
            if (source.handedness === 'left' && (Math.abs(axes[3]) > 0.1 || Math.abs(axes[2]) > 0.1)) {
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();
                xrGroup.position.addScaledVector(dir, -axes[3] * moveSpeed); xrGroup.position.addScaledVector(side, -axes[2] * moveSpeed);
            }
            if (source.handedness === 'right') {
                if (canSnapTurn && Math.abs(axes[2]) > 0.8) { xrGroup.rotation.y += (axes[2] > 0 ? -Math.PI/4 : Math.PI/4); canSnapTurn = false; setTimeout(() => canSnapTurn = true, 300); }
                if (axes[3] < -0.6) {
                    const tM = new THREE.Matrix4(); tM.identity().extractRotation(controllerL.matrixWorld);
                    raycaster.ray.origin.setFromMatrixPosition(controllerL.matrixWorld);
                    raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tM);
                    const hits = raycaster.intersectObjects(floorMeshes);
                    if (hits.length > 0) { teleportMarker.position.copy(hits[0].point); teleportMarker.visible = true; }
                } else if (teleportMarker.visible) {
                    const camPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
                    xrGroup.position.add(new THREE.Vector3().copy(teleportMarker.position).sub(camPos.setY(0)));
                    teleportMarker.visible = false;
                }
            }
        }
    }

    function handleInteraction() {
        const hits = raycaster.intersectObjects(scene.children, true);
        if (hits.length === 0) return;
        const target = hits[0].object;
        if (target.userData.type === 'science_object') { explainObject(target.userData.name); return; }
        if (target.userData.type === 'table_tablet') { 
             // Bauanleitungs-Trigger
             const statusDiv = document.getElementById('ai-status');
             statusDiv.innerText = "Lade Anleitung...";
             window.getKitInstructions();
             return; 
        }
        if (target.userData.type === 'vr_order_btn') { orderKit(target.userData.kit); return; }
        if (target.userData.type === 'kit_box') { if (!isCarrying && !currentTable) isCarrying = true; else if (!isCarrying && currentTable) unpackKit(); return; }
        if (isCarrying && target.userData.type === 'table_top') { currentTable = target.userData; kitBox.position.copy(currentTable.pos).setY(currentTable.pos.y + 0.3); isCarrying = false; return; }
        let p = target; if (p.userData.parentPart) p = p.userData.parentPart;
        while(p.parent && !p.userData.step) p = p.parent;
        if(p.userData.step) tryAssemble(p);
    }

    function onMouseDown() { if (!renderer.xr.isPresenting) { raycaster.setFromCamera(mouse, camera); handleInteraction(); }}
    function onMouseMove(event) {
        mouse.x = (event.clientX/window.innerWidth)*2-1; mouse.y = -(event.clientY/window.innerHeight)*2+1;
        if (isCarrying && kitBox && !renderer.xr.isPresenting) {
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -1.1);
            const intersectPoint = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, intersectPoint);
            kitBox.position.copy(intersectPoint);
        }
    }

    let isWindmillSpinning = false;
    function animate() { 
        if (!renderer.xr.isPresenting) controls.update(); 
        handleVRMovement(); 
        if (playgroundObjects.carousel) playgroundObjects.carousel.rotation.y += 0.01;
        if (isWindmillSpinning && activeModel) activeModel.rotation.z += 0.1; 
        renderer.render(scene, camera); 
    }
    function onWindowResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    init();
</script>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta-Labor: Pro Forschungszentrum & Physik-Park</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .panel { background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #ccc; pointer-events: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2); margin-bottom: 10px; max-width: 320px; color: #333; }
        h1 { margin: 0 0 8px 0; font-size: 1.1rem; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        p { font-size: 0.8rem; line-height: 1.4; color: #444; }
        .kit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { background: #3498db; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s; font-size: 0.75rem; }
        button:hover { background: #2980b9; }
        #ai-panel { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); width: 320px; display: none; }
        .ai-sparkle { color: #8e44ad; font-weight: bold; }
        .loading-spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(142, 68, 173, 0.3); border-radius: 50%; border-top-color: #8e44ad; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="panel">
        <h1>High-Tech Forschungszentrum</h1>
        <p><b>Showroom</b> links für Bestellungen.<br><b>Science Park</b> durch die Türöffnung rechts.</p>
        <div class="kit-grid">
            <button onclick="orderKit('windmill')">Windmühle</button>
            <button onclick="orderKit('car')">Solar-Auto</button>
            <button onclick="orderKit('chemistry')">Chemie-Set</button>
            <button onclick="orderKit('fuelcell')">Brennstoffzelle</button>
        </div>
    </div>
    
    <div id="assembly-panel" class="panel" style="display:none;">
        <h1 id="kit-title">Projekt-Fortschritt</h1>
        <div id="progress-bar" style="width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden;">
            <div id="progress-fill" style="width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s;"></div>
        </div>
    </div>

    <div id="ai-panel" class="panel">
        <h1><span class="ai-sparkle">📱</span> Gemini KI-Laborant</h1>
        <div id="ai-content" style="max-height: 250px; overflow-y: auto; font-size: 0.85rem; margin-bottom: 10px; line-height: 1.4;">
            Wähle ein Objekt aus.
        </div>
        <div id="ai-status" style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">Bereit...</div>
    </div>
</div>

<script type="module">
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

    // ==========================================
    // 1. KI & API LOGIK (GEMINI)
    // ==========================================
    const apiKey = ""; 
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";
    const TTS_MODEL = "gemini-2.5-flash-preview-tts";

    async function generateAIText(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Du bist ein KI-Mentor in einem Forschungszentrum." }] } };
        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const result = await response.json();
        return result.candidates?.[0]?.content?.parts?.[0]?.text || "Fehler bei der Anfrage.";
    }

    async function speakText(text) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: `Erkläre kurz: ${text}` }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } };
        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const result = await response.json();
        const base64Audio = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
        if (base64Audio) playAudio(base64Audio);
    }

    function playAudio(base64Data) {
        const binaryString = atob(base64Data);
        const bytes = new Int16Array(binaryString.length / 2);
        for (let i = 0; i < binaryString.length; i += 2) bytes[i/2] = (binaryString.charCodeAt(i+1) << 8) | binaryString.charCodeAt(i);
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = audioCtx.createBuffer(1, bytes.length, 24000);
        buffer.getChannelData(0).set(Array.from(bytes).map(v => v / 32768));
        const source = audioCtx.createBufferSource(); source.buffer = buffer; source.connect(audioCtx.destination); source.start();
    }

    // ==========================================
    // 2. THREE.JS ENGINE SETUP
    // ==========================================
    let scene, camera, renderer, raycaster, mouse, controls, xrGroup;
    let controllerR, controllerL, teleportMarker;
    let tables = [], interactiveObjects = [], floorMeshes = [];
    let isCarrying = false, kitBox = null, currentTable = null, activeKitType = null;
    let assemblyStep = 0, totalSteps = 1;
    const moveSpeed = 0.08;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0xd4e4f5, 20, 500);

        xrGroup = new THREE.Group();
        scene.add(xrGroup);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 1.6, 15);
        xrGroup.add(camera);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.6, 0);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // Beleuchtung
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        scene.add(sun);

        buildEnvironment();
        buildArchitecture();
        buildSciencePark();
        setupVR();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        
        renderer.setAnimationLoop(animate);
    }

    // ==========================================
    // 3. ARCHITEKTUR & KOLLISION
    // ==========================================
    function buildArchitecture() {
        const wallH = 6, labW = 40, labD = 35;
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf5f6f7 });
        
        // Boden & Decke
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(labW, labD), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        floor.rotation.x = -Math.PI / 2; floor.position.y = 0.01; floor.receiveShadow = true;
        scene.add(floor); floorMeshes.push(floor);

        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(labW, labD), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        ceiling.rotation.x = Math.PI / 2; ceiling.position.y = wallH; scene.add(ceiling);

        // Wände (Solid)
        const wallBack = new THREE.Mesh(new THREE.BoxGeometry(labW, wallH, 0.5), wallMat);
        wallBack.position.set(0, wallH/2, labD/2); scene.add(wallBack);
        
        const wallRight = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, labD), wallMat);
        wallRight.position.set(labW/2, wallH/2, 0); scene.add(wallRight);

        // Trennwand Showroom (Links)
        const wallLeftA = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, 10), wallMat); wallLeftA.position.set(-labW/2, wallH/2, 12.5); scene.add(wallLeftA);
        const wallLeftB = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, 10), wallMat); wallLeftB.position.set(-labW/2, wallH/2, -12.5); scene.add(wallLeftB);
        const wallLeftTop = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.5, 15), wallMat); wallLeftTop.position.set(-labW/2, 4.75, 0); scene.add(wallLeftTop);

        // Showroom-Raum
        const shopSize = 15; const shopX = -labW/2 - shopSize/2;
        const sFloor = new THREE.Mesh(new THREE.PlaneGeometry(shopSize, shopSize), new THREE.MeshStandardMaterial({ color: 0x333 }));
        sFloor.rotation.x = -Math.PI/2; sFloor.position.set(shopX, 0.02, 0); scene.add(sFloor); floorMeshes.push(sFloor);
        const sW1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, wallH, shopSize), wallMat); sW1.position.set(shopX - shopSize/2, wallH/2, 0); scene.add(sW1);
        const sW2 = new THREE.Mesh(new THREE.BoxGeometry(shopSize, wallH, 0.5), wallMat); sW2.position.set(shopX, wallH/2, shopSize/2); scene.add(sW2);
        const sW3 = new THREE.Mesh(new THREE.BoxGeometry(shopSize, wallH, 0.5), wallMat); sW3.position.set(shopX, wallH/2, -shopSize/2); scene.add(sW3);

        const counter = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 8), new THREE.MeshStandardMaterial({ color: 0x111 }));
        counter.position.set(shopX + 3, 0.5, 0); scene.add(counter);

        const kits = [
            { id: 'windmill', color: 0x3498db, z: -3 },
            { id: 'car', color: 0xe74c3c, z: -1 },
            { id: 'chemistry', color: 0x2ecc71, z: 1 },
            { id: 'fuelcell', color: 0xf1c40f, z: 3 }
        ];
        kits.forEach(k => {
            const btn = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.6), new THREE.MeshStandardMaterial({ color: k.color, emissive: k.color, emissiveIntensity: 0.5 }));
            btn.position.set(shopX + 3, 1.15, k.z); btn.userData = { type: 'vr_order_btn', kit: k.id };
            scene.add(btn); interactiveObjects.push(btn);
        });

        // --- GLASFRONT MIT TÜR ---
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x222, metalness: 0.8 });
        const glassMat = new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        
        // Rahmen oben/unten
        const bF = new THREE.Mesh(new THREE.BoxGeometry(labW, 0.4, 0.6), frameMat); bF.position.set(0, 0.2, -labD/2); scene.add(bF);
        const tF = new THREE.Mesh(new THREE.BoxGeometry(labW, 0.4, 0.6), frameMat); tF.position.set(0, wallH-0.2, -labD/2); scene.add(tF);

        // Glas-Elemente (Links und Mitte-Rechts)
        const gL = new THREE.Mesh(new THREE.PlaneGeometry(15, wallH-0.8), glassMat); gL.position.set(-12.5, wallH/2, -labD/2 + 0.05); scene.add(gL);
        const gR = new THREE.Mesh(new THREE.PlaneGeometry(20, wallH-0.8), glassMat); gR.position.set(10, wallH/2, -labD/2 + 0.05); scene.add(gR);

        // Türpfosten (Echte Öffnung)
        const pL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 0.6), frameMat); pL.position.set(-5, 1.75, -labD/2); scene.add(pL);
        const pR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 0.6), frameMat); pR.position.set(-1.5, 1.75, -labD/2); scene.add(pR);
        const pT = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.3, 0.6), frameMat); pT.position.set(-3.25, 3.5, -labD/2); scene.add(pT);

        // Tische & Stühle (Modulare Platzierung)
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 5; j++) {
                const tx = (i * 8) - 12; const tz = (j * 6) - 12;
                buildCompleteTable(tx, tz);
            }
        }
    }

    function buildCompleteTable(x, z) {
        const group = new THREE.Group();
        const plate = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 2.0), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        plate.position.y = 0.8; plate.userData = { type: 'table_top', pos: new THREE.Vector3(x, 0.8, z) };
        group.add(plate); tables.push(plate); interactiveObjects.push(plate);

        // Beine (Vier Stück)
        const legGeo = new THREE.BoxGeometry(0.12, 0.8, 0.12);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
        [[1.6, 0.4, 0.85], [-1.6, 0.4, 0.85], [1.6, 0.4, -0.85], [-1.6, 0.4, -0.85]].forEach(p => {
            const leg = new THREE.Mesh(legGeo, legMat); leg.position.set(p[0], p[1], p[2]); group.add(leg);
        });

        // 2 Stühle pro Tisch
        for(let s=0; s<2; s++) {
            const chair = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({color: 0x222});
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.7), mat); seat.position.y = 0.45; chair.add(seat);
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 0.08), mat); back.position.set(0, 0.8, 0.35); chair.add(back);
            [[0.25, 0.22, 0.25], [-0.25, 0.22, 0.25], [0.25, 0.22, -0.25], [-0.25, 0.22, -0.25]].forEach(p => {
                const l = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.45), mat); l.position.set(p[0], p[1], p[2]); chair.add(l);
            });
            chair.position.z = (s === 0 ? 1.4 : -1.4); chair.rotation.y = (s === 0 ? 0 : Math.PI);
            group.add(chair);
        }

        const tablet = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.02, 0.2), new THREE.MeshStandardMaterial({ color: 0x111 }));
        tablet.position.set(1.2, 0.86, 0.6); tablet.userData = { type: 'table_tablet' }; group.add(tablet); interactiveObjects.push(tablet);

        group.position.set(x, 0, z); scene.add(group);
    }

    // ==========================================
    // 4. SCIENCE PARK (KONSTRUKTION FIX)
    // ==========================================
    function buildSciencePark() {
        const area = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0xc2b280 }));
        area.rotation.x = -Math.PI/2; area.position.set(0, 0.01, -110); scene.add(area); floorMeshes.push(area);

        // --- RUTSCHE (NEU: LEITER RICHTUNG PLATTFORM) ---
        const slide = new THREE.Group();
        const metalMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.6, roughness: 0.2 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x5b3a29 });

        // Leiter
        const ladderL = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 5), woodMat); ladderL.position.set(-0.75, 2.5, 0); slide.add(ladderL);
        const ladderR = ladderL.clone(); ladderR.position.set(0.75, 2.5, 0); slide.add(ladderR);
        for(let i=0; i<8; i++) {
            const step = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.05, 0.2), woodMat); step.position.y = i*0.6 + 0.3; slide.add(step);
        }
        // Plattform oben
        const platform = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.1, 1.6), woodMat); platform.position.set(0, 4.8, -0.8); slide.add(platform);

        // Gleitfläche (Geneigt weg von der Leiter)
        const slideSurface = new THREE.Mesh(new THREE.BoxGeometry(1.6, 12, 0.15), metalMat);
        slideSurface.position.set(0, 2.4, -6.5); slideSurface.rotation.x = -0.42; 
        slideSurface.userData = { type: 'science_object', name: 'Rutsche' };
        slide.add(slideSurface); interactiveObjects.push(slideSurface);

        // Seitenwangen
        const sideL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 12, 0.6), woodMat); sideL.position.set(-0.8, 2.6, -6.5); sideL.rotation.x = -0.42; slide.add(sideL);
        const sideR = sideL.clone(); sideR.position.set(0.8, 2.6, -6.5); slide.add(sideR);

        slide.position.set(20, 0, -80); scene.add(slide);

        // --- SCHAUKEL (NEU: STÄBE VERBUNDEN & SEILE) ---
        const swing = new THREE.Group();
        const beam = new THREE.Mesh(new THREE.BoxGeometry(8, 0.3, 0.3), woodMat); beam.position.y = 5.5; swing.add(beam);
        // A-Rahmen Beine (Fixiert)
        [[3.8, 2.7, 2], [3.8, 2.7, -2], [-3.8, 2.7, 2], [-3.8, 2.7, -2]].forEach(p => {
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 6.5, 0.2), woodMat);
            leg.position.set(p[0], p[1], p[2]); leg.rotation.z = (p[0]>0 ? 0.2 : -0.2); leg.rotation.x = (p[2]>0 ? 0.2 : -0.2);
            swing.add(leg);
        });
        // Seile (Cylinder)
        const ropeL = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 4.3), new THREE.MeshStandardMaterial({color:0x222}));
        ropeL.position.set(-1, 3.3, 0); swing.add(ropeL);
        const ropeR = ropeL.clone(); ropeR.position.set(1, 3.3, 0); swing.add(ropeR);
        // Sitzbrett
        const seat = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 0.6), new THREE.MeshStandardMaterial({color: 0x222}));
        seat.position.y = 1.1; seat.userData = { type: 'science_object', name: 'Schaukel' };
        swing.add(seat); interactiveObjects.push(seat);

        swing.position.set(-20, 0, -80); scene.add(swing);

        // Newton Pendel (Verbessert)
        const newton = new THREE.Group();
        const nf = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 0.2), new THREE.MeshStandardMaterial({color:0x777})); nf.position.y = 3; newton.add(nf);
        for(let i=0; i<5; i++) {
            const bGroup = new THREE.Group();
            const string = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 4), new THREE.MeshStandardMaterial({color:0x222})); string.position.y = -2; bGroup.add(string);
            const ball = new THREE.Mesh(new THREE.SphereGeometry(0.48, 32, 32), new THREE.MeshStandardMaterial({color: 0xdddddd, metalness: 1}));
            ball.position.y = -4; ball.userData = { type: 'science_object', name: 'Newton Pendel' };
            bGroup.add(ball); bGroup.position.set(-2 + i*1.01, 6, 0); newton.add(bGroup); interactiveObjects.push(ball);
        }
        newton.position.set(35, 0, -110); scene.add(newton);
    }

    function buildEnvironment() {
        const vegetationGroup = new THREE.Group(); scene.add(vegetationGroup);
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
        for(let i=0; i<80; i++) {
            const rx = (Math.random()-0.5)*500; const rz = (Math.random()-0.5)*500;
            if(Math.abs(rx) < 65 && rz > -60 && rz < 50) continue;
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3), new THREE.MeshStandardMaterial({ color: 0x4b3621 })); trunk.position.y = 1.5; tree.add(trunk);
            const l = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), leafMat); l.position.y = 3.5; tree.add(l);
            tree.position.set(rx, 0, rz); scene.add(tree);
        }
    }

    // ==========================================
    // 5. INTERAKTION & VR
    // ==========================================
    window.orderKit = (type) => {
        if (kitBox) scene.remove(kitBox); activeKitType = type; assemblyStep = 1;
        kitBox = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 1.2), new THREE.MeshStandardMaterial({ color: 0xd2b48c }));
        kitBox.position.set(-28.5, 1.4, 0); kitBox.userData = { type: 'kit_box' };
        scene.add(kitBox); interactiveObjects.push(kitBox);
        document.getElementById('ai-panel').style.display = 'block';
        document.getElementById('ai-content').innerText = `Paket ${type} bestellt. Bringe es zum Tisch und klicke es an zum Auspacken.`;
    };

    function unpackKit() {
        if (!currentTable) return;
        scene.remove(kitBox); kitBox = null; assemblyStep = 1; parts.forEach(p => scene.remove(p)); parts = [];
        const tx = currentTable.pos.x, tz = currentTable.pos.z, th = currentTable.pos.y;
        document.getElementById('assembly-panel').style.display = 'block';
        const d = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.6,0.6), new THREE.MeshStandardMaterial({color:0x3498db}));
        d.position.set(tx, th+0.3, tz); d.userData = { step: 1 }; scene.add(d); parts.push(d); interactiveObjects.push(d);
        totalSteps = 1;
    }

    async function explainObject(name) {
        const contentDiv = document.getElementById('ai-content');
        const statusDiv = document.getElementById('ai-status');
        document.getElementById('ai-panel').style.display = 'block';
        statusDiv.innerHTML = '<div class="loading-spinner"></div> Analysiere ' + name + '...';
        const text = await generateAIText(`Erkläre kurz das physikalische Prinzip von ${name} auf einem Spielplatz.`);
        contentDiv.innerHTML = `<strong>Wissenschaft: ${name}</strong><br>${text}`;
        await speakText(text);
        statusDiv.innerText = "Bereit.";
    }

    window.getKitInstructions = async () => {
        const text = await generateAIText(`Bauanleitung für ${activeKitType}. Max 3 Schritte.`);
        document.getElementById('ai-content').innerHTML = `<strong>Anleitung:</strong><br>${text}`;
        await speakText(text);
    };

    function setupVR() {
        controllerR = renderer.xr.getController(0);
        controllerR.addEventListener('selectstart', () => { raycaster.ray.origin.setFromMatrixPosition(controllerR.matrixWorld); const tM = new THREE.Matrix4(); tM.identity().extractRotation(controllerR.matrixWorld); raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tM); handleInteraction(); });
        xrGroup.add(controllerR); controllerL = renderer.xr.getController(1); xrGroup.add(controllerL);
        teleportMarker = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.04, 12, 32), new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 }));
        teleportMarker.rotation.x = -Math.PI/2; teleportMarker.visible = false; scene.add(teleportMarker);
    }

    function handleVRMovement() {
        const session = renderer.xr.getSession(); if (!session) return;
        for (const source of session.inputSources) {
            if (!source.gamepad) continue;
            const axes = source.gamepad.axes;
            if (source.handedness === 'left' && (Math.abs(axes[3]) > 0.1 || Math.abs(axes[2]) > 0.1)) {
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();
                xrGroup.position.addScaledVector(dir, -axes[3] * moveSpeed); xrGroup.position.addScaledVector(side, -axes[2] * moveSpeed);
                // Kollisions-Check (Unsichtbare Wände)
                if(xrGroup.position.x > 19) xrGroup.position.x = 19;
                if(xrGroup.position.x < -40) xrGroup.position.x = -40;
                if(xrGroup.position.z > 17) xrGroup.position.z = 17;
            }
            if (source.handedness === 'right') {
                if (canSnapTurn && Math.abs(axes[2]) > 0.8) { xrGroup.rotation.y += (axes[2] > 0 ? -Math.PI/4 : Math.PI/4); canSnapTurn = false; setTimeout(() => canSnapTurn = true, 300); }
                if (axes[3] < -0.6) {
                    const tM = new THREE.Matrix4(); tM.identity().extractRotation(controllerL.matrixWorld); raycaster.ray.origin.setFromMatrixPosition(controllerL.matrixWorld); raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tM);
                    const hits = raycaster.intersectObjects(floorMeshes);
                    if (hits.length > 0) { teleportMarker.position.copy(hits[0].point); teleportMarker.visible = true; }
                } else if (teleportMarker.visible) {
                    const camPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
                    xrGroup.position.add(new THREE.Vector3().copy(teleportMarker.position).sub(camPos.setY(0))); teleportMarker.visible = false;
                }
            }
        }
    }

    function handleInteraction() {
        const hits = raycaster.intersectObjects(scene.children, true);
        if (hits.length === 0) return;
        const target = hits[0].object;
        if (target.userData.type === 'science_object') { explainObject(target.userData.name); return; }
        if (target.userData.type === 'table_tablet') { window.getKitInstructions(); return; }
        if (target.userData.type === 'vr_order_btn') { orderKit(target.userData.kit); return; }
        if (target.userData.type === 'kit_box') { if (!isCarrying && !currentTable) isCarrying = true; else if (!isCarrying && currentTable) unpackKit(); return; }
        if (isCarrying && target.userData.type === 'table_top') { currentTable = target.userData; kitBox.position.copy(currentTable.pos).setY(currentTable.pos.y + 0.3); isCarrying = false; return; }
        let p = target; while(p.parent && !p.userData.step) p = p.parent;
        if(p && p.userData.step) {
             p.position.set(currentTable.pos.x, currentTable.pos.y+0.3, currentTable.pos.z);
             document.getElementById('progress-fill').style.width = "100%";
        }
    }

    function onMouseDown() { if (!renderer.xr.isPresenting) { raycaster.setFromCamera(mouse, camera); handleInteraction(); }}
    function onMouseMove(event) {
        mouse.x = (event.clientX/window.innerWidth)*2-1; mouse.y = -(event.clientY/window.innerHeight)*2+1;
        if (isCarrying && kitBox && !renderer.xr.isPresenting) {
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -1.1);
            const intersectPoint = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, intersectPoint);
            kitBox.position.copy(intersectPoint);
        }
    }

    function animate() { if (!renderer.xr.isPresenting) controls.update(); handleVRMovement(); renderer.render(scene, camera); }
    function onWindowResize() { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
    init();
</script>

</body>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta-Labor: Pro-Edition & Science Park</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #a4c5e8; }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        .panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ccc;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            max-width: 300px;
            color: #333;
        }
        h1 { margin: 0 0 8px 0; font-size: 1.1rem; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        p { font-size: 0.8rem; line-height: 1.4; color: #444; }
        .kit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            font-size: 0.7rem;
        }
        button:hover { background: #2980b9; }
        #status-msg {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            font-size: 1rem;
            color: #2c3e50;
            font-weight: bold;
            background: rgba(255,255,255,0.4);
            padding: 8px;
        }
        #info-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 25px;
            border-radius: 15px;
            display: none;
            max-width: 450px;
            pointer-events: auto;
            z-index: 100;
            text-align: center;
            border: 2px solid #3498db;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="panel">
        <h1>Labor-Terminal</h1>
        <p>In VR: <b>L-Stick</b> = Gehen/Teleport, <b>R-Stick</b> = Drehen, <b>R-Trigger</b> = Bauen/Action!</p>
        <div class="kit-grid">
            <button onclick="orderKit('windmill')">Windmühle</button>
            <button onclick="orderKit('car')">Solar-Auto (10T)</button>
            <button onclick="orderKit('chemistry')">Chemie-Set</button>
            <button onclick="orderKit('fuelcell')">Brennstoffzelle</button>
        </div>
    </div>
    
    <div id="assembly-panel" class="panel" style="display:none;">
        <h1 id="kit-title">Bau-Phase</h1>
        <div id="progress-bar" style="width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden;">
            <div id="progress-fill" style="width: 0%; height: 100%; background: #2ecc71; transition: width 0.3s;"></div>
        </div>
    </div>
</div>

<div id="info-overlay">
    <h2 id="overlay-title" style="color: #3498db;">Experiment-Info</h2>
    <p id="overlay-text" style="font-size: 0.95rem; line-height: 1.5;"></p>
    <button onclick="document.getElementById('info-overlay').style.display='none'" style="margin-top:15px; width:auto; background:#3498db; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Verstanden</button>
</div>

<div id="status-msg">Bewegungs-Modus: Gehen & Teleport aktiv.</div>

<script type="module">
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

    let scene, camera, renderer, raycaster, mouse, controls;
    let kitBox, activeModel, teleportMarker;
    let tables = [], parts = [], floorMeshes = [];
    let isCarrying = false, currentTable = null, activeKitType = null;
    let assemblyStep = 0, totalSteps = 0;

    let playgroundState = { carouselSpeed: 0, seesawAngle: 0, seesawTarget: 0, newtonPower: 0 };
    let playgroundObjects = { carousel: null, seesawPlank: null, newtonBalls: [] };

    let controllerR, controllerL;
    let xrGroup;
    let canSnapTurn = true;
    const moveSpeed = 0.1;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa4c5e8);
        scene.fog = new THREE.Fog(0xd4e4f5, 40, 200);
        
        xrGroup = new THREE.Group();
        scene.add(xrGroup);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 12);
        xrGroup.add(camera);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.xr.enabled = true;
        
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.6, 0);
        controls.enableDamping = true;

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        setupLighting();
        createEnvironment();
        createArchitecture();
        createMachines();
        createSciencePlayground();
        setupVR();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        
        renderer.setAnimationLoop(animate);
    }

    function setupLighting() {
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.9);
        sun.position.set(50, 80, 20);
        sun.castShadow = true;
        scene.add(sun);
    }

    function createEnvironment() {
        const sky = new THREE.Mesh(new THREE.SphereGeometry(250, 32, 32), new THREE.MeshBasicMaterial({ color: 0x87CEEB, side: THREE.BackSide, fog: false }));
        scene.add(sky);

        const meadow = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), new THREE.MeshStandardMaterial({ color: 0x5a8a42 }));
        meadow.rotation.x = -Math.PI / 2; 
        meadow.receiveShadow = true;
        scene.add(meadow);
        floorMeshes.push(meadow);

        for(let i=0; i<80; i++) {
            const rx = (Math.random() - 0.5) * 450; const rz = (Math.random() - 0.5) * 450;
            if(Math.abs(rx) < 60 && Math.abs(rz) < 60) continue;
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 2.5), new THREE.MeshStandardMaterial({color: 0x4b3621}));
            trunk.position.y = 1.25; tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(2, 4, 8), new THREE.MeshStandardMaterial({color: 0x2d5a27}));
            leaves.position.y = 3.5; tree.add(leaves);
            tree.position.set(rx, 0, rz); scene.add(tree);
        }

        teleportMarker = new THREE.Mesh(
            new THREE.TorusGeometry(0.5, 0.05, 12, 32),
            new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 })
        );
        teleportMarker.rotation.x = -Math.PI / 2;
        teleportMarker.visible = false;
        scene.add(teleportMarker);
    }

    function createArchitecture() {
        const labFloor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshStandardMaterial({ color: 0xfafafa }));
        labFloor.rotation.x = -Math.PI / 2; labFloor.position.y = 0.01; labFloor.receiveShadow = true;
        scene.add(labFloor);
        floorMeshes.push(labFloor);
        
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(40, 8, 0.2), wallMat);
        backWall.position.set(0, 4, -20); scene.add(backWall);

        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 5; j++) {
                const tx = (i * 9) - 13.5; const tz = (j * 7) - 14;
                createTableAndChairs(tx, tz);
            }
        }

        const counter = new THREE.Mesh(new THREE.BoxGeometry(4, 1.1, 8), new THREE.MeshStandardMaterial({ color: 0x2c3e50 }));
        counter.position.set(-18, 0.55, 0); scene.add(counter);
    }

    function createTableAndChairs(tx, tz) {
        const tableGroup = new THREE.Group();
        const plate = new THREE.Mesh(new THREE.BoxGeometry(4, 0.15, 2.5), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        plate.position.set(0, 1.1, 0); plate.userData = { type: 'table_top', pos: new THREE.Vector3(tx, 1.18, tz) };
        tableGroup.add(plate); tables.push(plate);
        
        [[1.8, 0.55, 1], [-1.8, 0.55, 1], [1.8, 0.55, -1], [-1.8, 0.55, -1]].forEach(p => {
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.1, 0.1), new THREE.MeshStandardMaterial({color:0x777777}));
            leg.position.set(p[0], p[1], p[2]); tableGroup.add(leg);
        });

        for(let s=0; s<2; s++) {
            createChair(tableGroup, 0, 0, (s === 0 ? 1.8 : -1.8), (s === 0 ? 0 : Math.PI));
        }

        tableGroup.position.set(tx, 0, tz);
        scene.add(tableGroup);
    }

    function createChair(parent, x, y, z, rot = 0) {
        const chair = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({color: 0x333333});
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.8), mat);
        seat.position.y = 0.6; chair.add(seat);
        const back = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.1), mat);
        back.position.set(0, 1.0, 0.4); chair.add(back);
        
        // Stuhlbeine hinzugefügt
        const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.6);
        [[0.3, 0.3, 0.3], [-0.3, 0.3, 0.3], [0.3, 0.3, -0.3], [-0.3, 0.3, -0.3]].forEach(p => {
            const leg = new THREE.Mesh(legGeo, mat);
            leg.position.set(p[0], p[1], p[2]);
            chair.add(leg);
        });

        chair.position.set(x, y, z);
        chair.rotation.y = rot;
        parent.add(chair);
    }

    function createMachines() {
        const roomFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 40), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
        roomFloor.rotation.x = -Math.PI / 2; roomFloor.position.set(35, 0.03, 0); scene.add(roomFloor);
        floorMeshes.push(roomFloor);

        for(let k=0; k<4; k++) {
            const p = new THREE.Group();
            p.add(new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 1.5), new THREE.MeshStandardMaterial({color: 0x222222})));
            const f = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.8, 1.4), new THREE.MeshStandardMaterial({color: 0x3498db, wireframe: true}));
            f.position.y = 0.9; p.add(f); p.position.set(28, 0, -15 + (k*5)); scene.add(p);
        }
    }

    function createSciencePlayground() {
        const area = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({ color: 0xd2b48c }));
        area.rotation.x = -Math.PI / 2; area.position.set(-60, 0.04, -60); area.receiveShadow = true;
        scene.add(area);
        floorMeshes.push(area);

        // Newton
        const newtonFrame = new THREE.Group();
        for(let i=0; i<5; i++) {
            const ballGroup = new THREE.Group();
            const ball = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 0.8}));
            ball.position.y = -5; ball.userData = { type: 'newton_ball', index: i }; ballGroup.add(ball);
            ballGroup.position.set(-1.6 + (i * 0.81), 6, 0); newtonFrame.add(ballGroup);
            playgroundObjects.newtonBalls.push(ballGroup);
        }
        newtonFrame.position.set(-60, 0, -50); scene.add(newtonFrame);

        // Carousel
        const carousel = new THREE.Group();
        const cBase = new THREE.Mesh(new THREE.CylinderGeometry(4.5, 4.5, 0.3, 32), new THREE.MeshStandardMaterial({color: 0xe74c3c}));
        cBase.userData = { type: 'carousel' }; carousel.add(cBase);
        carousel.position.set(-75, 0.15, -70); scene.add(carousel);
        playgroundObjects.carousel = carousel;

        // Seesaw
        const seesaw = new THREE.Group();
        const plank = new THREE.Mesh(new THREE.BoxGeometry(8, 0.15, 0.8), new THREE.MeshStandardMaterial({color: 0xf1c40f}));
        plank.position.y = 1.1; plank.userData = { type: 'seesaw' }; seesaw.add(plank);
        playgroundObjects.seesawPlank = plank; seesaw.position.set(-45, 0, -70); scene.add(seesaw);
    }

    function setupVR() {
        // Rechter Controller (Interaktion)
        controllerR = renderer.xr.getController(0);
        controllerR.addEventListener('selectstart', () => {
            const tempMatrix = new THREE.Matrix4();
            tempMatrix.identity().extractRotation(controllerR.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controllerR.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
            handleInteraction();
        });
        xrGroup.add(controllerR);

        // Linker Controller (Bewegung & Teleport)
        controllerL = renderer.xr.getController(1);
        xrGroup.add(controllerL);

        const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-10)]));
        controllerR.add(line.clone()); 
        controllerL.add(line.clone());
    }

    function handleVRInput() {
        const session = renderer.xr.getSession();
        if (!session) return;

        for (const source of session.inputSources) {
            if (!source.gamepad) continue;
            const axes = source.gamepad.axes;

            // Linker Controller: Smooth Locomotion & Teleport
            if (source.handedness === 'left') {
                // Smooth Movement (Stick-Eingabe)
                if (Math.abs(axes[3]) > 0.1 || Math.abs(axes[2]) > 0.1) {
                    const direction = new THREE.Vector3();
                    camera.getWorldDirection(direction);
                    direction.y = 0;
                    direction.normalize();
                    
                    const side = new THREE.Vector3().crossVectors(camera.up, direction).normalize();
                    
                    xrGroup.position.addScaledVector(direction, -axes[3] * moveSpeed);
                    xrGroup.position.addScaledVector(side, axes[2] * moveSpeed);
                }

                // Teleportation (Joystick drücken nach vorne für Marker)
                if (axes[3] < -0.6) {
                    const tempMatrix = new THREE.Matrix4();
                    tempMatrix.identity().extractRotation(controllerL.matrixWorld);
                    raycaster.ray.origin.setFromMatrixPosition(controllerL.matrixWorld);
                    raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
                    const intersects = raycaster.intersectObjects(floorMeshes);
                    if (intersects.length > 0) {
                        teleportMarker.position.copy(intersects[0].point);
                        teleportMarker.visible = true;
                    }
                } else if (teleportMarker.visible) {
                    // Beamen beim Loslassen
                    const camPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);
                    const offset = new THREE.Vector3().copy(teleportMarker.position).sub(camPos.setY(0));
                    xrGroup.position.add(offset);
                    teleportMarker.visible = false;
                }
            }

            // Rechter Controller: Snap Turn
            if (source.handedness === 'right') {
                if (canSnapTurn && Math.abs(axes[2]) > 0.8) {
                    const angle = axes[2] > 0 ? -Math.PI / 4 : Math.PI / 4;
                    xrGroup.rotation.y += angle;
                    canSnapTurn = false;
                    setTimeout(() => { canSnapTurn = true; }, 300);
                }
            }
        }
    }

    function handleInteraction() {
        const intersects = raycaster.intersectObjects(scene.children, true);
        if (intersects.length === 0) return;
        const target = intersects[0].object;

        if (target.userData.type === 'carousel') playgroundState.carouselSpeed += 0.2;
        if (target.userData.type === 'seesaw') playgroundState.seesawTarget = (playgroundState.seesawTarget > 0) ? -0.3 : 0.3;
        if (target.userData.type === 'newton_ball') playgroundState.newtonPower = 1.0;
        
        if (target.userData.type === 'kit_box' && !isCarrying) {
            isCarrying = true; document.getElementById('status-msg').innerText = "Wähle einen Tisch."; return;
        }
        if (isCarrying && target.userData.type === 'table_top') {
            currentTable = target.userData.pos; kitBox.position.copy(currentTable).setY(1.38);
            isCarrying = false; assemblyStep = 2; document.getElementById('status-msg').innerText = "Klicke Box zum Auspacken!"; return;
        }
        if (target.userData.type === 'kit_box' && !isCarrying) { unpackKit(); return; }
        
        let p = target; while(p.parent && !p.userData.step) p = p.parent;
        if(p.userData.step) tryAssemble(p);
    }

    window.orderKit = function(type) {
        if (kitBox) scene.remove(kitBox);
        activeKitType = type; assemblyStep = 1;
        kitBox = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 1.2), new THREE.MeshStandardMaterial({ color: 0xd2b48c }));
        kitBox.position.set(-18, 1.4, 0); kitBox.userData = { type: 'kit_box' };
        scene.add(kitBox);
    };

    function unpackKit() {
        if (!currentTable) return;
        scene.remove(kitBox); kitBox = null; assemblyStep = 1;
        parts.forEach(p => scene.remove(p)); parts = [];
        document.getElementById('assembly-panel').style.display = 'block';
        const tx = currentTable.x; const tz = currentTable.z;

        if (activeKitType === 'windmill') {
            totalSteps = 3;
            createWindmillParts(tx, tz);
        } else if (activeKitType === 'car') {
            totalSteps = 10;
            createCarParts(tx, tz);
        } else if (activeKitType === 'chemistry') {
            totalSteps = 4;
            createChemistryParts(tx, tz);
        } else if (activeKitType === 'fuelcell') {
            totalSteps = 5;
            createFuelCellParts(tx, tz);
        }
    }

    function createWindmillParts(tx, tz) {
        const b = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,0.1), new THREE.MeshStandardMaterial({color:0x333333}));
        b.position.set(tx-1, 1.3, tz); b.userData = { step: 1 }; scene.add(b); parts.push(b);
        const m = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.1, 1.2), new THREE.MeshStandardMaterial({color:0xbdc3c7}));
        m.position.set(tx+1, 1.3, tz); m.userData = { step: 2 }; scene.add(m); parts.push(m);
        const r = new THREE.Group(); r.add(new THREE.Mesh(new THREE.SphereGeometry(0.12)));
        for(let i=0; i<3; i++){
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.02), new THREE.MeshStandardMaterial({color:0x3498db}));
            const p = new THREE.Object3D(); p.rotation.z = (i*Math.PI*2)/3; blade.position.y = 0.4; p.add(blade); r.add(p);
        }
        r.position.set(tx, 1.3, tz+0.8); r.userData = { step: 3 }; r.children.forEach(c => c.userData.parentPart = r); scene.add(r); parts.push(r);
    }

    function createCarParts(tx, tz) {
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0xcc0000}));
        chassis.position.set(tx-1.5, 1.3, tz); chassis.userData = { step: 1 }; scene.add(chassis); parts.push(chassis);
        for(let i=0; i<2; i++){
            const a = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.1), new THREE.MeshStandardMaterial({color:0x444444}));
            a.rotation.x = Math.PI/2; a.position.set(tx, 1.3, tz+(i===0?0.5:-0.5)); a.userData = { step: 2+i }; scene.add(a); parts.push(a);
        }
        for(let i=0; i<4; i++){
            const w = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.15), new THREE.MeshStandardMaterial({color:0x111111}));
            w.rotation.z = Math.PI/2; w.position.set(tx+1, 1.3, tz-0.6+(i*0.4)); w.userData = { step: 4+i }; scene.add(w); parts.push(w);
        }
        const engine = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({color:0x777777}));
        engine.position.set(tx-1, 1.3, tz+0.6); engine.userData = { step: 8 }; scene.add(engine); parts.push(engine);
        const solar = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.02, 0.6), new THREE.MeshStandardMaterial({color:0x000044}));
        solar.position.set(tx-1, 1.3, tz-0.6); solar.userData = { step: 9 }; scene.add(solar); parts.push(solar);
        const shell = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.7), new THREE.MeshStandardMaterial({color:0xcc0000, transparent:true, opacity:0.5}));
        shell.position.set(tx, 1.3, tz+1); shell.userData = { step: 10 }; scene.add(shell); parts.push(shell);
    }

    function createChemistryParts(tx, tz) {
        const stand = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.1, 0.5), new THREE.MeshStandardMaterial({color:0x8b4513}));
        stand.position.set(tx-1, 1.3, tz); stand.userData = { step: 1 }; scene.add(stand); parts.push(stand);
        for(let i=0; i<3; i++){
            const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.7), new THREE.MeshStandardMaterial({color:(i===0?0x00ff00:i===1?0xff0000:0x0000ff), transparent:true, opacity:0.6}));
            tube.position.set(tx+i*0.5, 1.3, tz); tube.userData = { step: 2+i }; scene.add(tube); parts.push(tube);
        }
    }

    function createFuelCellParts(tx, tz) {
        const base = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 1.2), new THREE.MeshStandardMaterial({color:0x333333}));
        base.position.set(tx-1, 1.3, tz); base.userData = { step: 1 }; scene.add(base); parts.push(base);
        const h2 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({color:0xff3333}));
        h2.position.set(tx+1, 1.3, tz-0.4); h2.userData = { step: 2 }; scene.add(h2); parts.push(h2);
        const o2 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({color:0x3333ff}));
        o2.position.set(tx+1, 1.3, tz+0.4); o2.userData = { step: 3 }; scene.add(o2); parts.push(o2);
        const cell = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.2), new THREE.MeshStandardMaterial({color:0x999999}));
        cell.position.set(tx, 1.3, tz); cell.userData = { step: 4 }; scene.add(cell); parts.push(cell);
        const led = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshStandardMaterial({color:0x222222}));
        led.position.set(tx, 1.6, tz); led.userData = { step: 5 }; scene.add(led); parts.push(led);
    }

    function tryAssemble(part) {
        const step = part.userData.step; if (step !== assemblyStep) return;
        const tx = currentTable.x; const tz = currentTable.z;
        if (activeKitType === 'windmill') {
            if(step === 1) part.position.set(tx, 1.18, tz);
            if(step === 2) { part.rotation.z = 0; part.position.set(tx, 1.78, tz); }
            if(step === 3) { part.position.set(tx, 2.38, tz+0.1); part.rotation.x = Math.PI/2; activeModel = part; isWindmillSpinning = true; }
        } else if (activeKitType === 'car') {
            if(step === 1) part.position.set(tx, 1.25, tz);
            if(step === 2) { part.rotation.z = 0; part.position.set(tx, 1.25, tz-0.4); }
            if(step === 3) { part.rotation.z = 0; part.position.set(tx, 1.25, tz+0.4); }
            if(step >= 4 && step <= 7) { const offs = [[-0.6,0.4],[0.6,0.4],[-0.6,-0.4],[0.6,-0.4]]; part.position.set(tx+offs[step-4][0], 1.25, tz+offs[step-4][1]); }
            if(step === 8) part.position.set(tx, 1.45, tz);
            if(step === 9) part.position.set(tx, 1.6, tz);
            if(step === 10) { part.position.set(tx, 1.5, tz); showInfo("Solar-Auto", "Fertig! Das Solar-Panel wandelt Licht direkt in kinetische Energie für den Motor um."); }
        } else if (activeKitType === 'fuelcell') {
            if(step === 1) part.position.set(tx, 1.18, tz);
            if(step === 2) part.position.set(tx-0.4, 1.5, tz-0.4);
            if(step === 3) part.position.set(tx-0.4, 1.5, tz+0.4);
            if(step === 4) part.position.set(tx, 1.5, tz);
            if(step === 5) { part.position.set(tx, 1.9, tz); part.material.color.set(0x00ff00); showInfo("Brennstoffzelle", "Strom wird aus H2 und O2 erzeugt!"); }
        }
        assemblyStep++;
        document.getElementById('progress-fill').style.width = (assemblyStep/totalSteps * 100) + "%";
    }

    function showInfo(title, text) {
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-text').innerText = text;
        document.getElementById('info-overlay').style.display = 'block';
    }

    function onMouseDown(event) {
        if (renderer.xr.isPresenting) return;
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        handleInteraction();
    }

    function onMouseMove(event) {
        if (isCarrying && kitBox) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -1.3);
            const intersectPoint = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, intersectPoint);
            kitBox.position.copy(intersectPoint);
        }
    }

    let isWindmillSpinning = false;
    function animate() {
        if (!renderer.xr.isPresenting) controls.update();
        handleVRInput();
        const time = Date.now() * 0.001;
        if (playgroundObjects.carousel) { playgroundObjects.carousel.rotation.y += playgroundState.carouselSpeed; playgroundState.carouselSpeed *= 0.99; }
        if (playgroundObjects.seesawPlank) {
            playgroundState.seesawAngle += (playgroundState.seesawTarget - playgroundState.seesawAngle) * 0.1;
            playgroundObjects.seesawPlank.rotation.z = playgroundState.seesawAngle;
        }
        if (playgroundObjects.newtonBalls.length > 0) {
            const swing = Math.sin(time * 6) * 0.7 * playgroundState.newtonPower;
            playgroundObjects.newtonBalls[0].rotation.z = Math.max(0, swing);
            playgroundObjects.newtonBalls[4].rotation.z = Math.min(0, swing);
            playgroundState.newtonPower *= 0.994;
        }
        if (isWindmillSpinning && activeModel) activeModel.rotation.z += 0.1;
        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
</script>

</body>
</html>
